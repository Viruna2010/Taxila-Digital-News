        window.addEventListener('DOMContentLoaded', (event) => {
            var savedPwd = localStorage.getItem('taxila_secure_pwd');
            if (savedPwd) {
                try {
                    var dec = CryptoJS.AES.decrypt(enc, savedPwd).toString(CryptoJS.enc.Utf8);
                    if (dec) {
                        document.open();
                        document.write(dec);
                        document.close();
                    }
                } catch(e) {
                    localStorage.removeItem('taxila_secure_pwd');
                }
            }
        });

        function unlock() {
            var pwd = document.getElementById('userPwd').value;
            var box = document.getElementById('loginBox');
            var errorTxt = document.getElementById('error');
            try {
                var dec = CryptoJS.AES.decrypt(enc, pwd).toString(CryptoJS.enc.Utf8);
                if(!dec) throw new Error();
                
                localStorage.setItem('taxila_secure_pwd', pwd);
                
                box.style.transform = 'scale(1.1)';
                box.style.opacity = '0';
                box.style.filter = 'blur(10px)';
                
                setTimeout(() => {
                    document.open();
                    document.write(dec);
                    document.close();
                }, 500);
            } catch(e) {
                // Error Animation
                errorTxt.style.display = 'block';
                box.classList.remove('shake');
                void box.offsetWidth; // trigger reflow
                box.classList.add('shake');
                document.getElementById('userPwd').value = '';
            }
        }
    </script>
